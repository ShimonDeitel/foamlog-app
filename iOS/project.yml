name: Foamlog
options:
  bundleIdPrefix: com.shimondeitel.foamlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Foamlog:
    type: application
    platform: iOS
    sources:
      - path: Foamlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foamlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Foamlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FoamlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoamlogTests
      - path: Foamlog.storekit
    dependencies:
      - target: Foamlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foamlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FoamlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FoamlogUITests
    dependencies:
      - target: Foamlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foamlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Foamlog:
    build:
      targets:
        Foamlog: all
        FoamlogTests: [test]
        FoamlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Foamlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Foamlog.storekit
      targets:
        - FoamlogTests
        - FoamlogUITests
    archive:
      config: Release
